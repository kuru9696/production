{% extends "base.html" %}
{% block title %}ログイン{% endblock %}
{% block content %}
  <h2>ログイン</h2>
  <form method="POST">
    <label>ユーザー名</label>
    <input type="text" name="username" required>

    <label>パスワード</label>
    <input type="password" name="password" required>

    <button type="submit">ログイン</button>
  </form>
  <p>アカウントをお持ちでない方は <a href="{{ url_for('register') }}">新規登録</a></p>
{% endblock %}
